"Alien Flora of Exoplanet Zephyr-9":
  _description: "A speculative guide on the biology and evolutionary botany of planets orbiting M-type red dwarf stars."
  "Chapter 3: Photosynthesis under Red Dwarfs":
    summary: "Explains the light-absorption mechanisms of plants on Zephyr-9 and why their pigmentation differs drastically from Earth flora."
    content: |
      The native flora of Zephyr-9 relies on a process analogous to Earth-based photosynthesis, but adapted to the low-energy infrared and deep-red photon output of its host star, a small M-type red dwarf. Because high-energy blue and ultraviolet light are virtually absent, the plants cannot afford to reflect any usable light.

      Consequently, the dominant photosynthetic pigment on Zephyr-9 is not chlorophyll. Instead, evolution favored 'retinal-melanin' hybrids, which are highly efficient at absorbing the entire spectrum of available starlight. To the human eye, this complete absorption of visible light results in the plants appearing pitch black. This maximizes energy extraction in a dim environment, trading the vibrant greens of Earth for absolute solar efficiency.

