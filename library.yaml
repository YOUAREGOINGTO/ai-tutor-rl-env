"Thermodynamics of Computation":
  _description: "A specialized textbook connecting statistical mechanics, information theory, and the physical limits of computation."
  "Chapter 4: Landauer's Principle and the Cost of Forgetting":
    summary: "Derives Landauer's Principle, explaining the minimum thermodynamic cost of erasing one bit of information."
    content: |
      In 1961, Rolf Landauer solved the paradox of Maxwell's Demon by demonstrating that the creation of information is thermodynamically reversible, but the destruction of information is not. Landauer's Principle states that logically irreversible operations—such as erasing a bit of memory—must necessarily be accompanied by an increase in the entropy of the environment.

      Mathematically, the erasure of one bit of information requires the dissipation of a minimum amount of energy equal to E = kT ln(2), where k is the Boltzmann constant and T is the absolute temperature of the environment. In the context of quantum computing, when a qubit in a mixed state is forcefully reset to a pure baseline state (erased), the entropy of the quantum system decreases. To satisfy the Second Law of Thermodynamics, this 'missing' entropy is expelled into the laboratory environment as heat.
