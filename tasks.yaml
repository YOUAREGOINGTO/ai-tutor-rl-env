easy_1:
  difficulty: easy
  student_question: "What does the Python Basics book say about For Loops?"
  required_books: ["Python Basics"]
  max_steps: 5
  ground_truth_answer: "For loops iterate over sequences. range(start, stop, step) controls iteration. Example: for i in range(5): print(i)"
  grading_rubric: |
    - Must explain what for loops do (iterate over sequences)
    - Must mention range() with its parameters
    - Must include a working code example
    - Deduct for vague or incomplete explanations

easy_2:
  difficulty: easy
  student_question: "How do I declare variables in Python?"
  required_books: ["Python Basics"]
  max_steps: 5
  ground_truth_answer: "Variables are assigned with =. Python is dynamically typed. Example: x = 10 or name = 'Alice'."
  grading_rubric: |
    - Must explain the = assignment operator
    - Must mention dynamic typing
    - Must include at least one concrete example
    - Deduct if no example is given

medium_1:
  difficulty: medium
  student_question: "I keep getting a KeyError in my Python code. Where is that covered and how do I fix it?"
  required_books: ["Python Basics"]
  max_steps: 8
  ground_truth_answer: "KeyError is raised when accessing a missing dictionary key. Fix using .get(key, default) to return a fallback instead of crashing. Covered in Python Basics Chapter 7: Dictionaries."
  grading_rubric: |
    - Must identify KeyError as a dictionary key access error
    - Must explain .get(key, default) as the correct fix with syntax
    - Must cite Python Basics Chapter 7: Dictionaries
    - Deduct heavily if the fix is wrong, missing, or not explained
    - Deduct if chapter citation is absent

medium_2:
  difficulty: medium
  student_question: "What is the difference between bubble sort and merge sort?"
  required_books: ["Python Algorithms"]
  max_steps: 8
  ground_truth_answer: "Bubble sort is O(n²); merge sort is O(n log n) and faster for large inputs. Python Algorithms Chapter 6 covers both with code."
  grading_rubric: |
    - Must state both time complexities correctly (O(n²) vs O(n log n))
    - Must explain which is faster and why (input size matters)
    - Must cite Python Algorithms Chapter 6: Sorting Algorithms
    - Code examples improve the score but are not required

hard_1:
  difficulty: hard
  student_question: "I need to calculate Compound Interest in Python. Can you show me the formula and write the function?"
  required_books: ["Math Fundamentals", "Python Algorithms"]
  max_steps: 12
  ground_truth_answer: "Formula from Math Fundamentals Ch3: A = P*(1+r/n)**(n*t). Python function from Python Algorithms Ch2: def compound_interest(P, r, n, t): return P*(1+r/n)**(n*t)"
  grading_rubric: |
    - Must provide the formula A = P*(1+r/n)**(n*t) from Math Fundamentals Ch3
    - Must explain each variable (P=principal, r=rate, n=compounds/year, t=years)
    - Must include a working Python function implementing the formula
    - Must explicitly cite BOTH Math Fundamentals Ch3 AND Python Algorithms Ch2
    - Deduct 0.4 if either citation is missing
    - Deduct if formula variables are left unexplained

easy_3:
  difficulty: easy
  student_question: "I'm reading about Exoplanet Zephyr-9. Why do the plants there look black instead of green like on Earth?"
  required_books:
    - "Alien Flora of Exoplanet Zephyr-9"
  max_steps: 6
  ground_truth_answer: "Plants on Zephyr-9 look black because they orbit a red dwarf star that emits low-energy light. Their pigments (retinal-melanin hybrids) evolved to absorb all available visible and infrared light for maximum energy extraction, reflecting nothing back to the human eye."
  grading_rubric: |
    - Must mention the red dwarf star type as the root cause
    - Must state that black coloration results from absorbing all available light
    - Must name 'retinal-melanin' hybrids as the pigment (not Earth chlorophyll)
    - Deduct heavily if agent hallucinates Earth-based chlorophyll as the answer
    - Deduct if star type is not mentioned

medium_3:
  difficulty: medium
  student_question: "I am training a standard RNN and after 10 epochs my loss turns to NaN. What is the mathematical reason and what does Goodfellow's Deep Learning book recommend to fix it?"
  required_books:
    - "Deep Learning"
  max_steps: 8
  ground_truth_answer: "Loss turns NaN due to exploding gradients. Mathematically, RNNs repeatedly multiply the same weight matrix W across time steps. If eigenvalues of W exceed 1, gradients grow exponentially during BPTT. Chapter 10 recommends Gradient Clipping: rescale the gradient when its norm exceeds a threshold, preserving direction but capping magnitude."
  grading_rubric: |
    - Must explain repeated weight matrix multiplication as the cause
    - Must mention eigenvalues greater than 1 causing exponential gradient growth
    - Must explicitly name Gradient Clipping as the recommended mitigation
    - Must explain that clipping rescales the gradient norm without changing direction
    - Deduct heavily if LSTMs/GRUs are given as the answer without mentioning gradient clipping first
    - Must cite Deep Learning Chapter 10

hard_3:
  difficulty: hard
  student_question: "Explain the physical cost of resetting a quantum computer's memory. Use Nielsen & Chuang's quantum operations formalism and Landauer's Principle to explain why resetting a qubit increases entropy in the lab environment."
  required_books:
    - "Quantum Computation and Quantum Information"
    - "Thermodynamics of Computation"
  max_steps: 12
  ground_truth_answer: "Resetting a qubit is a non-unitary, trace-preserving quantum operation described by Kraus operators (Nielsen & Chuang Ch8). It maps any mixed state rho to pure state |0><0|, decreasing the qubit's von Neumann entropy. By Landauer's Principle (Thermodynamics of Computation Ch4), this logically irreversible operation must dissipate minimum energy E = kT ln(2) as heat into the environment, increasing environmental entropy to satisfy the Second Law of Thermodynamics."
  grading_rubric: |
    - Must define qubit erasure as a non-unitary trace-preserving operation using Kraus operators
    - Must state that the qubit's internal entropy decreases during reset (mixed to pure state)
    - Must explicitly state Landauer's formula E = kT ln(2)
    - Must connect heat dissipation to preserving the Second Law of Thermodynamics
    - Must cite BOTH books — max score 50% if only one book's perspective is present
    - Deduct if Kraus operators or operator-sum representation is not mentioned

easy_4:
  difficulty: easy
  student_question: "Can you explain how async/await works in Python for concurrent programming?"
  required_books: ["Python Basics"]
  max_steps: 6
  ground_truth_answer: "async/await is not covered in the available library. Python Basics only covers variables, for loops, and dictionaries. The agent should check the book, find no relevant chapter, and clearly tell the student this topic is not available in the library."
  grading_rubric: |
    - Must call list_books and get_summaries to verify the topic is not covered
    - Must clearly tell the student that async/await is NOT in the library
    - Must NOT hallucinate or answer from memory about async/await
    - Score 1.0 if agent checks the books and honestly says the topic is unavailable
    - Score 0.0 if agent answers with async/await content not sourced from any chapter
    - Deduct heavily for any response that provides async/await information without citing a chapter

hard_2:
  difficulty: hard
  student_question: "Explain geometric sequences AND write a Python function to compute their sum."
  required_books: ["Math Fundamentals", "Python Algorithms"]
  max_steps: 12
  ground_truth_answer: "Geometric sequence sum from Math Fundamentals Ch5: S = a*(1-r**n)/(1-r). Python function implementing it from Python Algorithms Ch2 function structure."
  grading_rubric: |
    - Must explain what a geometric sequence is (each term multiplied by common ratio)
    - Must provide the sum formula S = a*(1-r**n)/(1-r) from Math Fundamentals Ch5
    - Must write a Python function that implements the formula
    - Must cite both Math Fundamentals Ch5 AND Python Algorithms Ch2
    - Deduct if formula is missing or Python function is absent
    - Deduct if neither book is cited
